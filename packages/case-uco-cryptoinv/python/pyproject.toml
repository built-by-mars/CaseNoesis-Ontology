[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "case-uco-cryptoinv"
version = "0.1.0"
description = "Cryptocurrency and Financial Crime Investigation Extension bindings for CASE/UCO SDK"
requires-python = ">=3.10"
dependencies = [
    "case-uco>=1.4.0",
]

[project.entry-points."case_uco.extensions"]
cryptoinv = "case_uco_cryptoinv:_REGISTRY_PATH"
