name: Upstream Freshness

# The SDK vendors pinned snapshots of every upstream knowledge source:
#   - CASE + UCO (git submodules under ontology/)
#   - CAC Ontology + AEO (git submodules under ontology/<name>/ontology)
#   - SOLVE-IT (synced snapshot under ontology/solveit/)
#   - Upper ontologies + CDO-Shapes profiles (ontology/upper/)
# This weekly check compares each pin against upstream and fails when a
# release-driven source (SOLVE-IT, CAC) has published a newer release,
# signalling that a `make sync-upstream` refresh is due. Sources that are
# pinned to development branches (CASE, UCO, AEO, CDO-Shapes) only emit
# warnings on drift, since their HEADs move continuously.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  freshness:
    name: Compare vendored snapshots with upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check vendored snapshots against upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'EOF'
          import json
          import os
          import subprocess
          import sys
          import urllib.request

          def api(url: str) -> dict:
              request = urllib.request.Request(url, headers={
                  "User-Agent": "case-uco-sdk-freshness",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
              })
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          def gitlink_sha(path: str) -> str:
              out = subprocess.run(
                  ["git", "ls-tree", "HEAD", path],
                  capture_output=True, text=True, check=True,
              ).stdout.split()
              return out[2] if len(out) >= 3 else ""

          def default_branch_head(repo: str) -> str:
              branch = api(f"https://api.github.com/repos/{repo}").get("default_branch", "main")
              return api(f"https://api.github.com/repos/{repo}/commits/{branch}").get("sha", "")

          def latest_release(repo: str) -> str:
              try:
                  return api(f"https://api.github.com/repos/{repo}/releases/latest").get("tag_name", "")
              except urllib.error.HTTPError:
                  return ""

          stale: list[str] = []   # release-lag: fails the job
          drift: list[str] = []   # branch drift: warning only

          # --- Branch-pinned git submodules (CASE, UCO, AEO) ---------------
          for repo, path in [
              ("ucoProject/UCO", "ontology/UCO"),
              ("casework/CASE", "ontology/CASE"),
              ("UNHSAILLab/Adversary-Engagement-Ontology", "ontology/aeo/ontology"),
          ]:
              pinned = gitlink_sha(path)
              head = default_branch_head(repo)
              print(f"{path}: pinned {pinned[:12]}, upstream {head[:12]}")
              if head and pinned and head != pinned:
                  drift.append(f"{path}: pinned {pinned[:12]}, upstream default branch is {head[:12]}")

          # --- Release-driven submodule (CAC Ontology) ----------------------
          cac_pinned = gitlink_sha("ontology/cac/ontology")
          cac_release = latest_release("Project-VIC-International/CAC-Ontology")
          cac_release_sha = ""
          if cac_release:
              try:
                  cac_release_sha = api(
                      "https://api.github.com/repos/Project-VIC-International/"
                      f"CAC-Ontology/commits/{cac_release}"
                  ).get("sha", "")
              except urllib.error.HTTPError:
                  pass
          print(f"ontology/cac/ontology: pinned {cac_pinned[:12]}, latest release {cac_release} ({cac_release_sha[:12]})")
          if cac_release_sha and cac_pinned and cac_release_sha != cac_pinned:
              # The pin may legitimately be ahead of the latest release
              # (tracking post-release fixes); only flag when the release
              # commit is NOT an ancestor of the pinned commit.
              try:
                  comparison = api(
                      "https://api.github.com/repos/Project-VIC-International/"
                      f"CAC-Ontology/compare/{cac_pinned}...{cac_release_sha}"
                  )
                  release_ahead = comparison.get("ahead_by", 0) > 0
              except urllib.error.HTTPError:
                  release_ahead = True
              if release_ahead:
                  stale.append(
                      f"CAC Ontology: pinned {cac_pinned[:12]}, upstream released "
                      f"{cac_release} ({cac_release_sha[:12]})"
                  )

          # --- SOLVE-IT snapshot (release + ontology commit) ----------------
          manifest = json.load(open("ontology/solveit/manifest.json"))
          provenance = manifest.get("provenance", {})
          pinned_release = provenance.get("knowledge_base_release", "")
          pinned_commit = provenance.get("ontology_commit", "")
          kb_release = latest_release("SOLVE-IT-DF/solve-it")
          ont_head = default_branch_head("SOLVE-IT-DF/solve-it-ontology")
          print(f"SOLVE-IT KB: pinned {pinned_release}, latest {kb_release}")
          print(f"SOLVE-IT ontology: pinned {pinned_commit[:12]}, upstream {ont_head[:12]}")
          if kb_release and kb_release != pinned_release:
              stale.append(f"SOLVE-IT knowledge base: pinned {pinned_release}, upstream released {kb_release}")
          if ont_head and ont_head != pinned_commit:
              drift.append(f"SOLVE-IT ontology: pinned {pinned_commit[:12]}, upstream main is {ont_head[:12]}")

          # --- CDO-Shapes pins (ontology/upper/provenance.json) -------------
          upper = json.load(open("ontology/upper/provenance.json")).get("files", {})
          for rel, meta in sorted(upper.items()):
              repo_url = meta.get("source_repo", "")
              pinned_sha = meta.get("source_commit", "")
              if not repo_url or not pinned_sha:
                  continue
              repo = repo_url.removeprefix("https://github.com/")
              head = default_branch_head(repo)
              if head and head != pinned_sha:
                  drift.append(f"ontology/upper/{rel}: pinned {pinned_sha[:12]}, upstream is {head[:12]}")

          for line in drift:
              print(f"::warning::upstream drift — {line} (refresh with `make sync-upstream` when convenient)")
          if stale:
              print("::error::Vendored snapshots are behind upstream releases — run `make sync-upstream` and review the diffs:")
              for line in stale:
                  print(f"::error::  {line}")
              sys.exit(1)
          print("All release-driven snapshots match upstream.")
          EOF
