name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - ".github/workflows/ci.yml"
      - "generator/**"
      - "python/**"
      - "csharp/**"
      - "java/**"
      - "rust/**"
      - "ontology/**"
      - "mcp_server/**"
      - "extensions/**"
      - "evaluation/**"
      - "docs/**"
      - "examples/**"
      - "benchmarks/**"
      - "scripts/**"
      - "Makefile"
  pull_request:
    branches: [main, develop]
    paths:
      - ".github/workflows/ci.yml"
      - "generator/**"
      - "python/**"
      - "csharp/**"
      - "java/**"
      - "rust/**"
      - "ontology/**"
      - "mcp_server/**"
      - "extensions/**"
      - "evaluation/**"
      - "docs/**"
      - "examples/**"
      - "benchmarks/**"
      - "scripts/**"
      - "Makefile"

jobs:
  version-sync:
    name: Version Consistency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify package versions match across languages
        run: |
          set -euo pipefail
          PYPROJECT_VER=$(python -c "import tomllib; print(tomllib.load(open('python/pyproject.toml','rb'))['project']['version'])")
          INIT_VER=$(python -c "import re, pathlib; m=re.search(r'__version__\s*=\s*\"([^\"]+)\"', pathlib.Path('python/case_uco/__init__.py').read_text()); print(m.group(1))")
          CSPROJ_VER=$(python -c "import re, pathlib; m=re.search(r'<Version>([^<]+)</Version>', pathlib.Path('csharp/CaseUco/CaseUco.csproj').read_text()); print(m.group(1))")
          POM_VER=$(python -c "import re, pathlib; m=re.search(r'<artifactId>case-uco</artifactId>\s*<version>([^<]+)</version>', pathlib.Path('java/pom.xml').read_text(), re.S); print(m.group(1) if m else '')")
          if [ -z "$POM_VER" ]; then
            POM_VER=$(python -c "import re, pathlib; m=re.search(r'<version>([^<]+)</version>', pathlib.Path('java/pom.xml').read_text()); print(m.group(1))")
          fi
          CARGO_TOML_VER=$(python -c "import re, pathlib; m=re.search(r'^version\s*=\s*\"([^\"]+)\"', pathlib.Path('rust/Cargo.toml').read_text(), re.M); print(m.group(1))")
          CARGO_LOCK_VER=$(python -c "
          import pathlib, re
          text = pathlib.Path('rust/Cargo.lock').read_text()
          m = re.search(r'name = \"case-uco\"\nversion = \"([^\"]+)\"', text)
          print(m.group(1) if m else '')
          ")
          echo "python/pyproject.toml:     $PYPROJECT_VER"
          echo "python/__init__.py:       $INIT_VER"
          echo "csharp CaseUco.csproj:    $CSPROJ_VER"
          echo "java/pom.xml:             $POM_VER"
          echo "rust/Cargo.toml:          $CARGO_TOML_VER"
          echo "rust/Cargo.lock case-uco: $CARGO_LOCK_VER"
          FAIL=0
          for pair in \
            "pyproject.toml:$PYPROJECT_VER" \
            "__init__.py:$INIT_VER" \
            "CaseUco.csproj:$CSPROJ_VER" \
            "pom.xml:$POM_VER" \
            "Cargo.toml:$CARGO_TOML_VER" \
            "Cargo.lock:$CARGO_LOCK_VER"
          do
            name="${pair%%:*}"
            ver="${pair#*:}"
            if [ "$ver" != "$PYPROJECT_VER" ]; then
              echo "::error::Version mismatch: $name=$ver vs pyproject.toml=$PYPROJECT_VER"
              FAIL=1
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi
          echo "All language package versions and Cargo.lock agree on $PYPROJECT_VER"

  routing-evaluation:
    name: Held-out Routing Evaluation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install rdflib

      # Evaluation governance (issue #58): the held-out corpus must not be
      # edited in the same change as the router implementation unless the
      # commit message records an explicit evaluation-governance review.
      - name: Evaluation governance guard
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "$CHANGED"
          ROUTER_CHANGED=$(echo "$CHANGED" | grep -E '^mcp_server/(semantic_retrieval|investigation_router)\.py$' || true)
          CORPUS_CHANGED=$(echo "$CHANGED" | grep -E '^evaluation/routing/heldout-corpus-.*\.json$' || true)
          if [ -n "$ROUTER_CHANGED" ] && [ -n "$CORPUS_CHANGED" ]; then
            if git log --format=%B "$BASE".."$HEAD" | grep -qF '[eval-governance-approved]'; then
              echo "Co-modification approved via [eval-governance-approved] commit tag."
            else
              echo "::error::Router implementation and held-out corpus changed in the same PR without [eval-governance-approved] review tag."
              exit 1
            fi
          fi

      - name: Run held-out routing evaluation
        run: |
          python evaluation/routing/run_evaluation.py \
            --corpus evaluation/routing/heldout-corpus-v1.json \
            --report evaluation/routing/report.json

      - name: Upload evaluation report
        uses: actions/upload-artifact@v7
        with:
          name: routing-evaluation-report
          path: evaluation/routing/report.json

  generate:
    name: Generate Libraries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install generator dependencies
        run: pip install rdflib jinja2

      - name: Run code generator
        run: |
          PYTHONPATH=generator/src python -m case_uco_generator generate --lang all

      - name: Upload generated sources
        uses: actions/upload-artifact@v7
        with:
          name: generated-sources
          path: |
            python/case_uco/
            csharp/CaseUco/
            csharp/CaseUco.Tests/ExhaustiveInstantiationTests.cs
            java/src/
            rust/src/
            rust/tests/

  test-python:
    name: Test Python
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Install dependencies
        run: pip install rdflib jinja2 pytest mypy jsonschema

      - name: Run tests
        run: PYTHONPATH=generator/src:python python -m pytest generator/tests python/tests -v

      - name: Run MCP server tests
        run: python -m pytest mcp_server/tests -v

      - name: Type check
        run: cd python && mypy case_uco/ --ignore-missing-imports

  test-csharp:
    name: Test C#
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Build and test
        run: |
          cd csharp
          dotnet build
          dotnet test

      - name: Smoke test
        run: cd csharp && dotnet run --project CaseUco.Smoke

  test-java:
    name: Test Java
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Build and test
        run: |
          cd java
          mvn package -q

      - name: Smoke test
        run: cd java && mvn -q compile exec:java

  test-rust:
    name: Test Rust
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Clippy lint
        run: cd rust && cargo clippy -- -D warnings

      - name: Build and test
        run: |
          cd rust
          cargo build
          cargo test

      - name: Smoke test
        run: cd rust && cargo run --example smoke

  test-docs:
    name: Test Doc Snippets
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Install Python SDK
        run: pip install -e python/

      - name: Test documentation snippets
        run: python scripts/test_doc_snippets.py

  recipe-validation:
    name: Recipe Exemplar Validation
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Install Python SDK, RDFLib, and case-utils
        run: |
          pip install -e python/ rdflib case-utils jsonschema

      - name: Fail closed if case_validate missing
        run: |
          command -v case_validate
          case_validate --help >/dev/null

      - name: Run upper-ontology recipe gate
        run: |
          python mcp_server/tools/run_recipe_examples.py \
            --category upper-ontology \
            --validate \
            --timeout 180 \
            --report recipe-validation-report.json

      - name: Upload recipe validation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: recipe-validation-report
          path: recipe-validation-report.json
