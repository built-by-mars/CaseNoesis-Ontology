[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "case-uco-legalproc"
version = "0.1.0"
description = "Legal Process and Procedure Extension bindings for CASE/UCO SDK"
requires-python = ">=3.10"
dependencies = [
    "case-uco>=1.4.0",
]

[project.entry-points."case_uco.extensions"]
legalproc = "case_uco_legalproc:REGISTRY_PATH"
